<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timefall | Minecraft сервер</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="glass-bg"></div>
<div class="app-layout">
  <!-- Левая навигация -->
  <div class="sidebar">
    <div class="logo-area">
      <h2>Timefall</h2>
      <p>Vanilla+ сервер</p>
    </div>
    
    <div class="nav-menu">
      <a href="pages/home.html" class="nav-item" data-page="home"><i class="fas fa-home"></i><span>Главная</span></a>
      <a href="pages/wiki.html" class="nav-item" data-page="wiki"><i class="fas fa-book-open"></i><span>Wiki</span></a>
      <a href="pages/pass.html" class="nav-item" data-page="pass"><i class="fas fa-ticket-alt"></i><span>Проходка / Подписка</span></a>
      <a href="pages/members.html" class="nav-item" data-page="members"><i class="fas fa-users"></i><span>Участники</span></a>
    </div>
    
    <div class="profile-divider"></div>
    
    <!-- Личный кабинет -->
    <div class="profile-menu-item">
      <a href="pages/profile.html" class="nav-item" data-page="profile">
        <i class="fas fa-user-circle"></i><span>Личный кабинет</span>
      </a>
    </div>
    
    <!-- Нижняя панель с IP и онлайн -->
    <div class="server-info">
      <div class="ip-container">
        <span class="ip-address" id="serverIp">Timefall.org</span>
        <button class="copy-btn" onclick="copyIP()"><i class="fas fa-copy"></i></button>
      </div>
      <div class="online-status">
        <span class="online-dot"></span>
        <span id="onlineCount">N</span> игроков онлайн
      </div>
    </div>
  </div>

  <div class="main-content">
    <iframe src="pages/home.html" id="pageFrame" frameborder="0"></iframe>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
<script>
  function copyIP() {
    const ip = document.getElementById('serverIp').innerText;
    navigator.clipboard.writeText(ip);
    const btn = event.target.closest('.copy-btn');
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-check"></i> Скопировано!';
    setTimeout(() => {
      btn.innerHTML = originalText;
    }, 2000);
  }
  
  // Симуляция онлайн-счетчика
  let onlineCount = 248;
  setInterval(() => {
    const change = Math.floor(Math.random() * 7) - 3;
    let newCount = onlineCount + change;
    if (newCount < 120) newCount = 120;
    if (newCount > 450) newCount = 450;
    onlineCount = newCount;
    const onlineSpan = document.getElementById('onlineCount');
    if (onlineSpan) onlineSpan.textContent = onlineCount;
  }, 30000);
</script>
</body>
</html>
