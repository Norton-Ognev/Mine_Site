<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Timefall</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../style.css">
    <style>
        /* Переопределяем стили для страницы без бокового меню */
        body {
            overflow: auto;
            height: auto;
            min-height: 100vh;
        }
        
        .app-layout {
            display: block;
            height: auto;
            min-height: 100vh;
        }
        
        .main-content {
            margin-left: 100;
            padding: 2rem;
            margin: 0 auto;
            width: 100%;
        }
        
        /* Оставляем только нужные стили для личного кабинета */
        .warn-container {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }
        
        .warn-circle {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s;
        }
        
        .warn-circle.active {
            background: #ff4444;
            border-color: #ff4444;
            box-shadow: 0 0 15px rgba(255, 68, 68, 0.5);
        }
        
        .warn-circle.warning {
            background: #ffaa00;
            border-color: #ffaa00;
            box-shadow: 0 0 10px rgba(255, 170, 0, 0.4);
        }
        
        .banned-message {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            color: #ff8888;
            text-align: center;
        }
        
        .warning-message {
            background: rgba(255, 170, 0, 0.1);
            border: 1px solid #ffaa00;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            color: #ffaa00;
            text-align: center;
        }
        
        .subscription-badge, .pass-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
        
        .subscription-active, .pass-active {
            background: rgba(34, 255, 136, 0.2);
            color: #22ff88;
            border: 1px solid #22ff88;
        }
        
        .subscription-inactive, .pass-inactive {
            background: rgba(255, 68, 68, 0.2);
            color: #ff8888;
            border: 1px solid #ff4444;
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-row:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #aaa;
            font-weight: 500;
        }
        
        .info-value {
            color: #fff;
            font-weight: 600;
        }
        
        .btn-buy {
            background: #ffaa00;
            color: #000;
            margin-top: 1rem;
            width: 100%;
        }
        
        .btn-buy:hover {
            background: #ffcc33;
            box-shadow: 0 0 12px #ffaa00;
        }
        
        .logout-btn {
            background: rgba(255, 68, 68, 0.2);
            border: 1px solid #ff4444;
            color: #ff8888;
        }
        
        .logout-btn:hover {
            background: rgba(255, 68, 68, 0.4);
            box-shadow: 0 0 12px rgba(255, 68, 68, 0.3);
        }
        
        .welcome-text {
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .welcome-text h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        .welcome-text small {
            color: #888;
            font-size: 0.9rem;
        }
        
        /* Адаптация для мобильных */
        @media (max-width: 800px) {
            .main-content {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="glass-bg"></div>
    
    <div class="app-layout">
        <main class="main-content">
            <div id="profileContent">
                <div class="glass-card" style="text-align: center;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 3rem; color: #22ff88;"></i>
                    <p>Загрузка данных...</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        async function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                try {
                    await fetch('/api/logout.php', { method: 'POST', credentials: 'include' });
                    window.location.href = '/login.html';
                } catch(e) {
                    window.location.href = '/login.html';
                }
            }
        }
        
        async function loadProfile() {
            try {
                const response = await fetch('/api/user-data.php', {
                    credentials: 'include'
                });
                const data = await response.json();
                
                if (!data.success) {
                    window.location.href = '/login.html';
                    return;
                }
                
                const user = data.user;
                renderProfile(user);
                
            } catch(e) {
                console.error('Ошибка загрузки профиля', e);
                window.location.href = '/login.html';
            }
        }
        
        function renderProfile(user) {
            const container = document.getElementById('profileContent');
            
            // Варны
            let warnHtml = '';
            for (let i = 1; i <= 3; i++) {
                let status = '';
                if (user.is_banned) {
                    status = 'active';
                } else if (i <= user.warn_count) {
                    status = user.warn_count >= 2 ? 'active' : 'warning';
                }
                warnHtml += `<div class="warn-circle ${status}"></div>`;
            }
            
            // Статус подписки
            const hasSubscription = user.remaining_days > 0;
            const subscriptionHtml = hasSubscription ? `
                <span class="subscription-badge subscription-active">
                    <i class="fas fa-check-circle"></i> Подписка активна
                </span>
                <div class="info-row">
                    <span class="info-label">Осталось дней:</span>
                    <span class="info-value">${user.remaining_days} дн.</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Действует до:</span>
                    <span class="info-value">${user.subscription_valid_until || '—'}</span>
                </div>
            ` : `
                <span class="subscription-badge subscription-inactive">
                    <i class="fas fa-times-circle"></i> Нет активной подписки
                </span>
                <div class="info-row">
                    <span class="info-label">Дней подписки:</span>
                    <span class="info-value">0</span>
                </div>
            `;
            
            // Статус проходки
            const passHtml = user.has_pass ? `
                <span class="pass-badge pass-active">
                    <i class="fas fa-check-circle"></i> Проходка куплена
                </span>
                <div class="info-row">
                    <span class="info-label">Статус:</span>
                    <span class="info-value">Доступ на сервер есть</span>
                </div>
            ` : `
                <span class="pass-badge pass-inactive">
                    <i class="fas fa-clock"></i> Проходка не куплена
                </span>
                <button class="btn-green btn-buy" onclick="buyPass()">
                    <i class="fas fa-shopping-cart"></i> Купить проходку
                </button>
            `;
            
            // Сообщения о варнах/бане
            let warnMessageHtml = '';
            if (user.is_banned || user.warn_count >= 3) {
                warnMessageHtml = `
                    <div class="banned-message">
                        <i class="fas fa-gavel"></i> 
                        <strong>Ваш аккаунт забанен на сервере!</strong>
                        <br>Причина: Превышен лимит варнов (3/3)
                    </div>
                `;
            } else if (user.warn_count > 0) {
                warnMessageHtml = `
                    <div class="warning-message">
                        <i class="fas fa-exclamation-triangle"></i> 
                        <strong>Внимание!</strong> У вас ${user.warn_count}/3 варнов
                    </div>
                `;
            }
            
            container.innerHTML = `
                <!-- Приветствие -->
                <div class="welcome-text">
                    <h1>Добро пожаловать, ${user.minecraft_nick}!</h1>
                    <small>Дата регистрации: ${user.created_at}</small>
                </div>
                
                <!-- Основная информация -->
                <div class="glass-card">
                    <h2>Основная информация</h2>
                    <div class="info-row">
                        <span class="info-label">ID:</span>
                        <span class="info-value">#${user.id}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Ник в Minecraft:</span>
                        <span class="info-value">${user.minecraft_nick}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Email:</span>
                        <span class="info-value">${user.email}</span>
                    </div>
                </div>
                
                <!-- Подписка -->
                <div class="glass-card">
                    <h2>Подписка</h2>
                    ${subscriptionHtml}
                </div>
                
                <!-- Проходка на сервер -->
                <div class="glass-card">
                    <h2>Проходка на сервер</h2>
                    ${passHtml}
                </div>
                
                <!-- Варны -->
                <div class="glass-card">
                    <h2>Варны</h2>
                    <div class="warn-container">
                        ${warnHtml}
                    </div>
                    ${warnMessageHtml}
                </div>
            `;
        }
        
        function buyPass() {
            window.location.href = 'pass.html';
        }
        
        loadProfile();
    </script>
</body>
</html>
